<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Fondo verde oscuro -->
  <rect width="192" height="192" rx="40" fill="#0b1a16"/>
  
  <!-- Sombra/Relieve 3D de la tarjeta trasera -->
  <rect x="56" y="46" width="100" height="70" rx="16" fill="#142e26" stroke="#1a3d33" stroke-width="6"/>
  <!-- Tarjeta trasera -->
  <rect x="56" y="40" width="100" height="70" rx="16" fill="#1a3d33" stroke="#244035" stroke-width="6"/>

  <!-- Sombra/Relieve 3D de la tarjeta frontal -->
  <rect x="36" y="82" width="110" height="76" rx="20" fill="#142e26" stroke="#1a3d33" stroke-width="8"/>
  <!-- Tarjeta frontal plana/mate -->
  <rect x="36" y="74" width="110" height="76" rx="20" fill="#ffffff" stroke="#1a3d33" stroke-width="8"/>

  <!-- Líneas de texto en la tarjeta -->
  <line x1="56" y1="96" x2="126" y2="96" stroke="#1a3d33" stroke-width="6" stroke-linecap="round"/>
  <line x1="56" y1="116" x2="106" y2="116" stroke="#1a3d33" stroke-width="6" stroke-linecap="round"/>

  <!-- Estrella amarilla brillante tipo Duolingo -->
